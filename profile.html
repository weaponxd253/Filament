<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory | Filament Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <script>
        (function () {
            try {
                const KEY = "profile-theme";             // saved: "system" | "light" | "dark" | "solarized" | "hc"
                const saved = localStorage.getItem(KEY) || "system";
                const mql = window.matchMedia("(prefers-color-scheme: dark)");
                const resolved = saved === "system" ? (mql.matches ? "dark" : "light") : saved;

                // IMPORTANT: set EXACTLY ONE attribute you style from.
                // Use data-theme for your tokens. Avoid remapping here.
                document.documentElement.setAttribute("data-theme", resolved);

                // Optional: if you rely on Bootstrap’s data-bs-theme only for light/dark components:
                if (resolved === "dark") document.documentElement.setAttribute("data-bs-theme", "dark");
                else document.documentElement.setAttribute("data-bs-theme", "light");
            } catch { }
        })();
    </script>

    <script type="module">
        import { bootTheme } from "/scripts/theme.js";
        bootTheme();
    </script>

    <link rel="stylesheet" href="styles/profile.css" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="nav" class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="profile.html">Inventory</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button"
                        aria-label="Cycle theme" title="Cycle theme">
                        <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <!--  <header class="py-4 border-bottom">
        <div class="container d-flex flex-column flex-md-row align-items-start align-items-md-center gap-3">
            <img id="avatar" src="https://via.placeholder.com/120" alt="avatar" class="rounded" width="120"
                height="120" />
            <div class="flex-grow-1">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <h1 id="displayName" class="h4 mb-0">User Name</h1>
                    <span id="badge" class="badge text-bg-secondary">Member</span>
                </div>
                <p id="bio" class="text-secondary mb-2">Tracking all the tasty spools.</p>
                <div class="d-flex flex-wrap gap-3 small text-secondary">
                    <span>Total Favorites: <strong id="statFavorites">0</strong></span>
                    <span>Total Rolls: <strong id="statRolls">0</strong></span>
                    <span>Total Weight: <strong id="statWeight">0 g</strong></span>
                </div>
            </div>
        </div>
    </header>
    -->

    <main class="container my-4">
        <!-- Inventory tabs -->
        <ul class="nav nav-tabs" id="profileTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="filament-tab" data-bs-toggle="tab" data-bs-target="#filaments-pane"
                    type="button" role="tab" aria-controls="filaments-pane" aria-selected="true">My Filaments</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="activity-tab" data-bs-toggle="tab" data-bs-target="#activity-pane"
                    type="button" role="tab" aria-controls="activity-pane" aria-selected="false">Activity</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="favorites-tab" data-bs-toggle="tab" data-bs-target="#favorites-pane"
                    type="button" role="tab" aria-controls="favorites-pane" aria-selected="false">Favorites</button>
            </li>

        </ul>

        <div class="tab-content p-3 border border-top-0 rounded-bottom" id="profileTabsContent">
            <!-- Activity (default) -->
            <section class="tab-pane fade" id="activity-pane" role="tabpanel" aria-labelledby="activity-tab"
                tabindex="0">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h6 mb-0">Activity</h2>
                    <button id="clearActivity" class="btn btn-sm btn-outline-danger" type="button"
                        title="Clear all activity">
                        Clear Activity
                    </button>
                </div>

                <ul id="activityList" class="list-group list-group-flush">
                    <!-- items injected via JS -->
                </ul>
            </section>

            <!-- Favorites -->
            <section class="tab-pane fade" id="favorites-pane" role="tabpanel" aria-labelledby="favorites-tab"
                tabindex="0">
                <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                    <h2 class="h6 mb-0">Favorite Filaments</h2>
                    <div class="d-flex gap-2">
                        <div class="input-group input-group-sm" style="max-width: 260px;">
                            <span class="input-group-text">Search</span>
                            <input id="favSearch" type="search" class="form-control" placeholder="Color or category..." aria-label="Search favorite filaments" />
                        </div>
                        <select id="favSort" class="form-select form-select-sm" style="width:auto;">
                            <option value="name">Name A–Z</option>
                            <option value="rolls">Rolls ↓</option>
                            <option value="weight">Weight ↓</option>
                        </select>
                    </div>
                </div>

                <div id="favoritesGrid" class="row g-3">
                    <!-- favorite cards injected via JS -->
                </div>
            </section>

            <!-- My Filaments -->
            <section class="tab-pane fade show active" id="filaments-pane" role="tabpanel" aria-labelledby="filament-tab"
                tabindex="0">
                <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                    <div class="d-flex align-items-center gap-3">
                        <h2 class="h6 mb-0">My Filaments</h2>
                        <div class="small text-secondary">
                            <span>Total Rolls: <strong id="ownedRolls">0</strong></span>
                            <span class="ms-3">Total Weight: <strong id="ownedWeight">0 g</strong></span>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <div class="input-group input-group-sm" style="max-width: 280px;">
                            <span class="input-group-text">Search</span>
                            <input id="ownedSearch" type="search" class="form-control"
                                placeholder="Color, brand, material..." aria-label="Search inventory" />
                        </div>
                        <select id="ownedSort" class="form-select form-select-sm" style="width:auto;">
                            <option value="color">Color A–Z</option>
                            <option value="brand">Brand A–Z</option>
                            <option value="material">Material A–Z</option>
                            <option value="rolls">Rolls ↓</option>
                            <option value="weight">Weight ↓</option>
                        </select>
                        <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#filamentModal">
                            + Add Filament
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width:56px;">Swatch</th>
                                <th>Color</th>
                                <th>Brand</th>
                                <th>Material</th>
                                <th class="text-nowrap">Rolls</th>
                                <th class="text-nowrap">Weight (g)</th>
                                <th class="text-end" style="width:160px;">Actions</th>

                            </tr>
                        </thead>
                        <tbody id="ownedTableBody">
                            <!-- rows injected via JS -->
                        </tbody>
                    </table>
                </div>

            </section>


            <!-- Add/Edit Filament Modal -->
            <div class="modal fade" id="filamentModal" tabindex="-1" aria-labelledby="filamentModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <form id="filamentForm" class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="filamentModalLabel">Add Filament</h1>
                            <button class="btn-close" data-bs-dismiss="modal" aria-label="Close" type="button"></button>
                        </div>
                        <div class="modal-body row g-3">
                            <input type="hidden" id="filamentId" />
                            <div class="col-md-6">
                                <label class="form-label" for="filamentColor">Color</label>
                                <input id="filamentColor" class="form-control" placeholder="Black" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="filamentHex">Hex</label>
                                <div class="input-group">
                                    <span class="input-group-text p-0">
                                        <input id="filamentPicker" type="color"
                                            class="form-control form-control-color border-0" />
                                    </span>
                                    <input id="filamentHex" class="form-control" placeholder="#111111"
                                        pattern="#[0-9a-fA-F]{6}" required />
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="filamentBrand">Brand</label>
                                <input id="filamentBrand" class="form-control" placeholder="Bambu" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="filamentMaterial">Material</label>
                                <select id="filamentMaterial" class="form-select">
                                    <option>PLA</option>
                                    <option>PETG</option>
                                    <option>ABS</option>
                                    <option>ASA</option>
                                    <option>PC</option>
                                    <option>PA</option>
                                    <option>PA-CF</option>
                                    <option>TPU</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="filamentRolls">Rolls</label>
                                <input id="filamentRolls" type="number" min="0" step="1" class="form-control"
                                    value="1" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="filamentWeight">Weight (g)</label>
                                <input id="filamentWeight" type="number" min="0" step="50" class="form-control"
                                    value="1000" />
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-outline-secondary" data-bs-dismiss="modal"
                                type="button">Cancel</button>
                            <button class="btn btn-primary" type="submit">Save</button>
                        </div>
                    </form>
                </div>
            </div>



        </div>
    </main>


    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="status" aria-live="polite" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Filament Tracker</strong>
                <small>just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">Inventory updated.</div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="scripts/profile.js" defer></script>
</body>

</html>
