<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | Filament Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <script>
        (function () {
            try {
                const KEY = "profile-theme";
                const saved = localStorage.getItem(KEY) || "system";
                const mql = window.matchMedia("(prefers-color-scheme: dark)");
                const resolved = saved === "system" ? (mql.matches ? "dark" : "light") : saved;

                document.documentElement.setAttribute("data-theme", resolved);

                if (resolved === "dark") document.documentElement.setAttribute("data-bs-theme", "dark");
                else document.documentElement.setAttribute("data-bs-theme", "light");
            } catch { }
        })();
    </script>

    <script type="module">
        import { bootTheme } from "./scripts/theme.js";
        bootTheme();
    </script>

    <!-- App CSS -->
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/styles.css" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="mainNav" class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html"
                            data-page="home">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html" data-page="profile">Inventory</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button"
                        aria-label="Cycle theme" title="Cycle theme">
                        <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
                    </button>
                    <a class="btn btn-primary btn-sm" href="profile.html#filaments">
                        <i class="fa-solid fa-plus me-1" aria-hidden="true"></i>Add Filament
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="py-4 border-bottom">
        <div class="container">
            <h1 class="h3 mb-0">Filament Tracker</h1>
            <p class="text-secondary mb-0">Track 3D print filament</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container my-4">
        <section class="catalog-shell" aria-labelledby="catalogHeading">
            <div class="catalog-heading d-flex flex-wrap gap-3 justify-content-between align-items-start mb-3">
                <div>
                    <h2 id="catalogHeading" class="h5 mb-1">Catalog</h2>
                    <div id="catalogSummary" class="text-secondary small" aria-live="polite">Loading catalog...</div>
                </div>
                <a class="btn btn-outline-primary btn-sm" href="profile.html#favorites">
                    <i class="fa-solid fa-star me-1" aria-hidden="true"></i>View Favorites
                </a>
            </div>

            <div class="catalog-toolbar mb-3" aria-label="Catalog filters">
                <div class="input-group catalog-search">
                    <span class="input-group-text"><i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i></span>
                    <input id="catalogSearch" class="form-control" type="search"
                        placeholder="Search color, material, or brand" aria-label="Search catalog" />
                    <button id="catalogClear" class="btn btn-outline-secondary" type="button" aria-label="Clear catalog filters">
                        <i class="fa-solid fa-xmark me-1" aria-hidden="true"></i>Clear
                    </button>
                </div>

                <select id="materialFilter" class="form-select" aria-label="Filter by material">
                    <option value="all">All Materials</option>
                </select>

                <select id="catalogSort" class="form-select" aria-label="Sort catalog">
                    <option value="color">Color A-Z</option>
                    <option value="material">Material A-Z</option>
                    <option value="favorites">Favorites First</option>
                    <option value="owned">Owned First</option>
                    <option value="not-owned">Not Owned First</option>
                </select>
            </div>

            <div class="quick-filters mb-3" role="group" aria-label="Quick filters">
                <button class="btn btn-sm btn-primary" type="button" data-quick-filter="all" aria-pressed="true">All</button>
                <button class="btn btn-sm btn-outline-secondary" type="button" data-quick-filter="favorites" aria-pressed="false">
                    <i class="fa-solid fa-star me-1" aria-hidden="true"></i>Favorites
                </button>
                <button class="btn btn-sm btn-outline-secondary" type="button" data-quick-filter="owned" aria-pressed="false">In Inventory</button>
                <button class="btn btn-sm btn-outline-secondary" type="button" data-quick-filter="not-owned" aria-pressed="false">Not Owned</button>
                <button class="btn btn-sm btn-outline-secondary" type="button" data-quick-filter="PLA" aria-pressed="false">PLA</button>
                <button class="btn btn-sm btn-outline-secondary" type="button" data-quick-filter="PETG" aria-pressed="false">PETG</button>
            </div>

            <div id="catalogGrid" class="row g-3 catalog-grid" aria-live="polite"></div>
        </section>
    </main>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="status" aria-live="polite" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Filament Tracker</strong>
                <small>just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">Inventory updated.</div>
        </div>
    </div>

    <!-- Bootstrap JS (bundle includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- App JS -->
    <script src="scripts/shared.js" defer></script>
    <script src="scripts/app.js" defer></script>
</body>

</html>
