<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap App Starter</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <script>
        (function () {
            try {
                const KEY = "profile-theme";             // saved: "system" | "light" | "dark" | "solarized" | "hc"
                const saved = localStorage.getItem(KEY) || "system";
                const mql = window.matchMedia("(prefers-color-scheme: dark)");
                const resolved = saved === "system" ? (mql.matches ? "dark" : "light") : saved;

                // IMPORTANT: set EXACTLY ONE attribute you style from.
                // Use data-theme for your tokens. Avoid remapping here.
                document.documentElement.setAttribute("data-theme", resolved);

                // Optional: if you rely on Bootstrap’s data-bs-theme only for light/dark components:
                if (resolved === "dark") document.documentElement.setAttribute("data-bs-theme", "dark");
                else document.documentElement.setAttribute("data-bs-theme", "light");
            } catch { }
        })();
    </script>

    <script type="module">
        import { bootTheme } from "/scripts/theme.js";
        bootTheme();
    </script>


    <!-- App CSS -->
    <link rel="stylesheet" href="styles/styles.css" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="mainNav" class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item"><a class="nav-link active" href="#" data-page="home">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html" data-page="profile">Profile</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button"
                        aria-label="Toggle theme">🌗</button>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#exampleModal">Add
                        Filament</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="py-4 border-bottom">
        <div class="container">
            <h1 class="h3 mb-0">Filament Tracker</h1>
            <p class="text-secondary mb-0">Track 3D print filament</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container my-4">
        <!-- Tabs -->
        <ul class="nav nav-tabs" id="mainTabs" role="tablist"></ul>
        <div class="tab-content p-3 border border-top-0 rounded-bottom" id="mainTabsContent"></div>

    </main>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Hello there 👋</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">This modal is wired up and ready for your content.</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Do the thing</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="status" aria-live="polite" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Heads up</strong>
                <small>just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">This is a demo toast. Replace with your own message.</div>
        </div>
    </div>

    <!-- Bootstrap JS (bundle includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- App JS -->
    <script src="scripts/app.js" defer></script>
</body>

</html>
